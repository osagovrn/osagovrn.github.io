name: Deploy to GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: ПРОЧЕЕ/package-lock.json
      - run: npm install --no-audit --no-fund --prefix ПРОЧЕЕ
      - run: npm run build:css --prefix ПРОЧЕЕ
        continue-on-error: true
      - name: Prepare site bundle
        run: |
          mkdir _site
          shopt -s dotglob nullglob
          for item in *; do
            [ "$item" = "_site" ] && continue
            [ "$item" = "ПРОЧЕЕ" ] && continue
            cp -r "$item" _site/
          done
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
